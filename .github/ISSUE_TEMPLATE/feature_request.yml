name: Feature request
description: Suggest an idea or capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This keeps dual-use features human-gated (no autonomous transmit / HID)
          required: true
