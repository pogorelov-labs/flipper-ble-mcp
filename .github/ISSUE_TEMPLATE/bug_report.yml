name: Bug report
description: Something didn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for the report. Please do **not** include secrets or captured card/credential data."
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What you did, what you expected, and what happened instead.
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. 15.3"
    validations:
      required: true
  - type: input
    id: firmware
    attributes:
      label: Flipper firmware
      placeholder: "e.g. Momentum / Unleashed / official"
  - type: textarea
    id: logs
    attributes:
      label: Relevant output / logs
      render: text
  - type: checkboxes
    id: scope
    attributes:
      label: Confirmation
      options:
        - label: I am operating my own device / authorized targets only
          required: true
